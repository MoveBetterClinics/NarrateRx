<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 64" role="img" aria-label="NarrateRx">
  <title>NarrateRx</title>
  <defs>
    <style>
      .wm-narrate {
        font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        font-weight: 700;
        font-size: 36px;
        fill: #1c4d37;
      }
      .wm-rx {
        font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
        font-style: italic;
        font-weight: 600;
        font-size: 36px;
        fill: #ff8552;
      }
    </style>
  </defs>

  <!-- Icon mark: waveform (voice → content) -->
  <!-- outer bars: coral; center tall bar: deep evergreen; last bar: sage -->
  <rect x="0"  y="21" width="6" height="22" rx="3" fill="#ff8552"/>
  <rect x="11" y="12" width="6" height="40" rx="3" fill="#ff8552"/>
  <rect x="22" y="4"  width="6" height="56" rx="3" fill="#1c4d37"/>
  <rect x="33" y="16" width="6" height="32" rx="3" fill="#ff8552"/>
  <rect x="44" y="24" width="6" height="16" rx="3" fill="#6e9581"/>

  <!-- Wordmark: "narrate" evergreen + "Rx" coral italic -->
  <text x="62" y="45">
    <tspan class="wm-narrate">narrate</tspan><tspan class="wm-rx">Rx</tspan>
  </text>
</svg>
