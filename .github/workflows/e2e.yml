name: E2E smoke

on:
  pull_request:
    branches: [main]

# Cancel in-progress e2e runs on new pushes to the same PR — preview URLs
# only point at the latest commit anyway, so older runs are stale.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Wait for the Vercel deployment kicked off by the Vercel GitHub
      # integration on the same commit. Returns the preview URL once it's
      # READY. Pinned to a tagged release rather than a moving ref.
      - name: Wait for Vercel preview
        id: vercel-preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          check_interval: 10

      - name: Seed fixture data
        env:
          MULTITENANT_DATABASE_URL: ${{ secrets.MULTITENANT_DATABASE_URL }}
          E2E_WORKSPACE_SLUG: movebetter-people
          E2E_FIXTURE_CLINICIAN_NAME: E2E Smoke Clinician
        run: npm run e2e:seed

      - name: Install Playwright browsers
        run: npm run e2e:install

      - name: Run Playwright smoke
        env:
          E2E_BASE_URL: ${{ steps.vercel-preview.outputs.url }}
          E2E_WORKSPACE_SLUG: movebetter-people
          E2E_FIXTURE_CLINICIAN_NAME: E2E Smoke Clinician
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
