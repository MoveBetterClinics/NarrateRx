name: Weekly media backup

# Backs up Vercel Blob media + Supabase media_assets metadata to Backblaze B2
# for each brand. Runs Sundays at 09:00 UTC (02:00 PT) — low traffic window.
#
# Manual trigger via "workflow_dispatch" is supported for ad-hoc backups
# (e.g. before a risky migration or after a bulk import).
#
# Required GitHub Actions secrets (set per-brand with the suffix in caps):
#   SUPABASE_URL_PEOPLE / _EQUINE / _ANIMALS
#   SUPABASE_SERVICE_KEY_PEOPLE / _EQUINE / _ANIMALS
#   B2_KEY_ID
#   B2_APP_KEY
#   B2_BUCKET
#   B2_ENDPOINT  — e.g. https://s3.us-west-002.backblazeb2.com
#   B2_REGION    — e.g. us-west-002

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:
    inputs:
      brand:
        description: 'Brand to back up (leave empty for all)'
        required: false
        default: ''

jobs:
  backup:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        brand: [people, equine, animals]
    steps:
      - name: Skip non-matching brand on manual run
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.brand != '' && github.event.inputs.brand != matrix.brand }}
        run: echo "Skipping ${{ matrix.brand }} — manual run targeted ${{ github.event.inputs.brand }}" && exit 0

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Run backup
        env:
          BRAND: ${{ matrix.brand }}
          SUPABASE_URL:         ${{ matrix.brand == 'people'  && secrets.SUPABASE_URL_PEOPLE  || matrix.brand == 'equine' && secrets.SUPABASE_URL_EQUINE  || secrets.SUPABASE_URL_ANIMALS  }}
          SUPABASE_SERVICE_KEY: ${{ matrix.brand == 'people'  && secrets.SUPABASE_SERVICE_KEY_PEOPLE  || matrix.brand == 'equine' && secrets.SUPABASE_SERVICE_KEY_EQUINE  || secrets.SUPABASE_SERVICE_KEY_ANIMALS  }}
          B2_KEY_ID:   ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY:  ${{ secrets.B2_APP_KEY }}
          B2_BUCKET:   ${{ secrets.B2_BUCKET }}
          B2_ENDPOINT: ${{ secrets.B2_ENDPOINT }}
          B2_REGION:   ${{ secrets.B2_REGION }}
        run: node scripts/backup-blob.mjs
